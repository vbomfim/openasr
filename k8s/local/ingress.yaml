apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whisperx-server
  namespace: whisperx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"  # Uncomment when TLS is configured below
spec:
  ingressClassName: nginx
  rules:
    - host: whisperx.local
      http:
        paths:
          - path: /transcribe
            pathType: Prefix
            backend:
              service:
                name: whisperx-server
                port:
                  number: 9090
  # --- TLS configuration (uncomment to enable HTTPS) ---
  # 1. Create a TLS secret: kubectl create secret tls whisperx-tls --cert=cert.pem --key=key.pem -n whisperx
  # 2. Uncomment the tls block below
  # 3. Uncomment the ssl-redirect annotation above
  # tls:
  #   - hosts:
  #       - whisperx.local
  #     secretName: whisperx-tls
