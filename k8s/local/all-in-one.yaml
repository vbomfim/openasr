apiVersion: v1
kind: Namespace
metadata:
  name: whisperx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: whisperx-server-config
  namespace: whisperx
data:
  WSS_PORT: "9090"
  WSS_MAX_SESSIONS: "5"
  WSS_WINDOW_DURATION_MS: "20000"
  WSS_OVERLAP_DURATION_MS: "2000"
  WSS_INFERENCE_THREADS: "2"
  WSS_LOG_LEVEL: "info"
  WSS_LANGUAGE: "en"
  WSS_BEAM_SIZE: "5"
  WSS_CONFIG_PATH: "/dev/null"
---
# Secret: whisperx-server-secrets
# Create manually: kubectl apply -f k8s/local/secrets.yaml
# See k8s/local/secrets.yaml.example for template
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisperx-server
  namespace: whisperx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisperx-server
  template:
    metadata:
      labels:
        app: whisperx-server
    spec:
      initContainers:
        - name: model-downloader
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              MODEL=/models/ggml-small.en.bin
              CHECKSUM="5765be703c55280bdf7f9081469a504790544d4f820378c0750cc5c6d1e39e3e"
              if [ ! -f "$MODEL" ]; then
                echo "Downloading whisper small.en model (~466MB)..."
                curl -L --progress-bar -o "$MODEL" \
                  "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin"
              fi
              echo "Verifying SHA-256 checksum..."
              echo "$CHECKSUM  $MODEL" | sha256sum -c - || { echo "CHECKSUM FAILED — removing corrupt model"; rm -f "$MODEL"; exit 1; }
              echo "Model verified: $(ls -lh $MODEL)"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: model-vol
              mountPath: /models
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: whisperx-server
          image: whisperx-server:v0.2.1
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: whisperx-server-config
            - secretRef:
                name: whisperx-server-secrets
                optional: true
          env:
            - name: WHISPER_MODEL_PATH
              value: /models/ggml-small.en.bin
          volumeMounts:
            - name: model-vol
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: model-vol
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: whisperx-server
  namespace: whisperx
spec:
  type: NodePort
  selector:
    app: whisperx-server
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
