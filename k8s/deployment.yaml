apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisperx-server
  namespace: whisperx
  labels:
    app.kubernetes.io/name: whisperx-server
    app.kubernetes.io/part-of: whisperx-streaming-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: whisperx-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whisperx-server
        app.kubernetes.io/part-of: whisperx-streaming-server
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      automountServiceAccountToken: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: whisperx-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: whisperx-server
      containers:
        - name: whisperx-server
          image: ghcr.io/vbomfim/openasr:v0.2.1
          ports:
            - containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: whisperx-server-config
          env:
            - name: WHISPER_MODEL_PATH
              value: /models/ggml-large-v3.bin
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "8"
              memory: 16Gi
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: whisperx-model-storage
