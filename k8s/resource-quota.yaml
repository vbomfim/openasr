apiVersion: v1
kind: ResourceQuota
metadata:
  name: whisperx-quota
  namespace: whisperx
  labels:
    app.kubernetes.io/part-of: whisperx-streaming-server
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "64Gi"
    limits.cpu: "32"
    limits.memory: "128Gi"
    pods: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: whisperx-limits
  namespace: whisperx
  labels:
    app.kubernetes.io/part-of: whisperx-streaming-server
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
        memory: "4Gi"
      defaultRequest:
        cpu: "500m"
        memory: "1Gi"
      max:
        cpu: "8"
        memory: "32Gi"
