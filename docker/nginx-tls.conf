# nginx-tls.conf
#
# TLS-terminating reverse proxy for the whisperx streaming server.
# Proxies HTTPS → HTTP and WSS → WS to the upstream container.

upstream whisperx {
    server whisperx-server:9090;
}

server {
    listen 443 ssl;
    server_name whisperx.example.com;

    # --- TLS certificates ---------------------------------------------------
    # For Let's Encrypt, point these to the certbot-managed files:
    #   ssl_certificate     /etc/letsencrypt/live/whisperx.example.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/whisperx.example.com/privkey.pem;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # --- Security headers ----------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- WebSocket proxy -----------------------------------------------------
    location / {
        proxy_pass http://whisperx;
        proxy_http_version 1.1;

        # Headers required for WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;

        # Long timeouts for streaming audio sessions
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
