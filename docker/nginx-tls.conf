# nginx-tls.conf
#
# TLS-terminating reverse proxy for the whisperx streaming server.
# Proxies HTTPS → HTTP and WSS → WS to the upstream container.

upstream whisperx {
    server whisperx-server:9090;
}

server {
    listen 443 ssl;
    server_name whisperx.example.com;

    # --- TLS certificates ---------------------------------------------------
    # For Let's Encrypt, point these to the certbot-managed files:
    #   ssl_certificate     /etc/letsencrypt/live/whisperx.example.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/whisperx.example.com/privkey.pem;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    # Mozilla Intermediate cipher suite (ECDHE-only; DHE intentionally omitted)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # TLS session hardening
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — uncomment when using CA-signed certificates
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;
    # resolver_timeout 5s;

    # --- Security headers ----------------------------------------------------
    # WARNING: nginx does NOT inherit add_header into location blocks that
    # define their own add_header. If you add any add_header inside a
    # location block, you MUST repeat ALL of these headers there.

    # HSTS — forces HTTPS for 2 years. Uncomment includeSubDomains only if
    # ALL subdomains of your domain support HTTPS.
    add_header Strict-Transport-Security "max-age=63072000" always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- WebSocket proxy -----------------------------------------------------
    location / {
        proxy_pass http://whisperx;
        proxy_http_version 1.1;

        # Headers required for WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;

        # Long timeouts for streaming audio sessions
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
