# Local development — Docker on localhost
target.host=localhost
target.port=30090
target.protocol=ws
auth.enabled=true
auth.token=dev-test-key-change-in-production

# Speech config
language=en
sample_rate=16000
encoding=pcm_s16le
window_duration_ms=5000
overlap_duration_ms=500

# Audio streaming
audio.file=data/audio/sample-short-5s.raw
audio.chunk_size_bytes=6400
audio.chunk_interval_ms=200

# Test defaults (overridden per scenario)
concurrent.sessions=3
ramp.up.seconds=10
test.duration.seconds=60
