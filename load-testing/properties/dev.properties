# Dev cluster
target.host=whisperx-dev.internal
target.port=9090
target.protocol=ws
auth.enabled=false
auth.token=

# Speech config
language=en
sample_rate=16000
encoding=pcm_s16le
window_duration_ms=20000
overlap_duration_ms=2000

# Audio streaming
audio.file=data/audio/sample-medium-30s.raw
audio.chunk_size_bytes=6400
audio.chunk_interval_ms=200

# Test defaults
concurrent.sessions=10
ramp.up.seconds=60
test.duration.seconds=300
