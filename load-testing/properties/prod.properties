# Production — read-only baseline (smoke tests only!)
target.host=whisperx.mycompany.com
target.port=443
target.protocol=wss
auth.enabled=true
auth.token=${__property(AUTH_TOKEN)}

# Speech config
language=en
sample_rate=16000
encoding=pcm_s16le
window_duration_ms=20000
overlap_duration_ms=2000

# Audio streaming — short audio only for smoke
audio.file=data/audio/sample-short-5s.raw
audio.chunk_size_bytes=6400
audio.chunk_interval_ms=200

# Smoke only — never run load/stress against production!
concurrent.sessions=2
ramp.up.seconds=5
test.duration.seconds=30
