# Staging environment (K8s ingress, TLS)
target.host=whisperx-staging.mycompany.com
target.port=443
target.protocol=wss
auth.enabled=true
auth.token=${__property(AUTH_TOKEN)}

# Speech config
language=en
sample_rate=16000
encoding=pcm_s16le
window_duration_ms=20000
overlap_duration_ms=2000

# Audio streaming — use longer audio for realism
audio.file=data/audio/sample-long-120s.raw
audio.chunk_size_bytes=6400
audio.chunk_interval_ms=200

# Test defaults
concurrent.sessions=20
ramp.up.seconds=180
test.duration.seconds=900
