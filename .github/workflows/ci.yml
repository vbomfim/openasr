name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            build-essential cmake pkg-config \
            libopus-dev libsamplerate0-dev zlib1g-dev

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DGGML_METAL=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run unit tests
        run: cd build && ctest --output-on-failure

      - name: Test summary
        if: always()
        run: |
          cd build && ctest --output-on-failure 2>&1 | tail -5

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t openasr:test .

      - name: Download tiny.en model
        run: |
          mkdir -p models
          curl -L -o models/ggml-tiny.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin
          echo "bd577a113a864445d4c299885e0cb97d4ba92b5f  models/ggml-tiny.en.bin" | sha1sum -c -

      - name: Start server
        run: |
          docker run -d --name openasr-test \
            -p 9090:9090 \
            -v ${{ github.workspace }}/models:/models \
            -e WHISPER_MODEL_PATH=/models/ggml-tiny.en.bin \
            openasr:test

      - name: Wait for server health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/health | grep -q '"status":"ok"'; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to become healthy"
          docker logs openasr-test
          exit 1

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Run integration tests
        run: python3 tools/integration_tests.py --server-url ws://localhost:9090/transcribe

      - name: Generate test audio
        run: |
          sudo apt-get update && sudo apt-get install -y espeak-ng
          espeak-ng -w /tmp/test_speech.wav "hello world this is a test of speech recognition"

      - name: Run E2E transcription test
        run: python3 tools/e2e_test.py --server-url ws://localhost:9090/transcribe --wav /tmp/test_speech.wav

      - name: Verify server health after tests
        run: |
          curl -sf http://localhost:9090/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', f'Unhealthy: {data}'
          print('Server healthy after all tests')
          "

      - name: Server logs
        if: always()
        run: docker logs openasr-test
