name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to registry'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-slim:
    name: Build slim image (no model)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:slim
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: spdx-json
          artifact-name: sbom-slim.spdx.json

  build-slim-cuda:
    name: Build slim CUDA image (no model)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push slim CUDA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cuda
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:slim-cuda
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-cuda
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-cuda
          format: spdx-json
          artifact-name: sbom-slim-cuda.spdx.json

  build-with-model:
    name: Build ${{ matrix.model }} image
    needs: build-slim
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - model: tiny.en
            file: ggml-tiny.en.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin
          - model: base.en
            file: ggml-base.en.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
          - model: large-v3-turbo
            file: ggml-large-v3-turbo.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin
          - model: large-v3
            file: ggml-large-v3.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3.bin
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Create model Dockerfile
        run: |
          cat > Dockerfile.with-model << 'EOF'
          FROM ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} AS base
          FROM ubuntu:24.04 AS downloader
          RUN apt-get update && apt-get install -y curl && rm -rf /var/lib/apt/lists/*
          ARG MODEL_URL
          ARG MODEL_FILE
          RUN mkdir -p /models && curl -L -o /models/${MODEL_FILE} ${MODEL_URL}
          FROM base
          COPY --from=downloader /models /models
          EOF
          echo "ENV WHISPER_MODEL_PATH=/models/${{ matrix.file }}" >> Dockerfile.with-model

      - name: Build and push model image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.with-model
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.push }}
          build-args: |
            MODEL_URL=${{ matrix.url }}
            MODEL_FILE=${{ matrix.file }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ matrix.model }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ matrix.model }}-${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-with-model-cuda:
    name: Build ${{ matrix.model }} CUDA image
    needs: build-slim-cuda
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - model: tiny.en
            file: ggml-tiny.en.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin
          - model: base.en
            file: ggml-base.en.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
          - model: large-v3-turbo
            file: ggml-large-v3-turbo.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin
          - model: large-v3
            file: ggml-large-v3.bin
            url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3.bin
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Create CUDA model Dockerfile
        run: |
          cat > Dockerfile.with-model-cuda << 'EOF'
          FROM ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-cuda AS base
          FROM ubuntu:24.04 AS downloader
          RUN apt-get update && apt-get install -y curl && rm -rf /var/lib/apt/lists/*
          ARG MODEL_URL
          ARG MODEL_FILE
          RUN mkdir -p /models && curl -L -o /models/${MODEL_FILE} ${MODEL_URL}
          FROM base
          COPY --from=downloader /models /models
          EOF
          echo "ENV WHISPER_MODEL_PATH=/models/${{ matrix.file }}" >> Dockerfile.with-model-cuda

      - name: Build and push CUDA model image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.with-model-cuda
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push }}
          build-args: |
            MODEL_URL=${{ matrix.url }}
            MODEL_FILE=${{ matrix.file }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ matrix.model }}-cuda
            ghcr.io/${{ env.IMAGE_NAME }}:${{ matrix.model }}-${{ steps.version.outputs.version }}-cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max
